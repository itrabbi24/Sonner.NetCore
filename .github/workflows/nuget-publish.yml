name: Publish to NuGet

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Covers the latest .NET SDK for building the net5.0 target

    - name: Restore dependencies
      run: dotnet restore Sonner.NetCore/Sonner.NetCore.csproj

    - name: Build
      run: dotnet build Sonner.NetCore/Sonner.NetCore.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack Sonner.NetCore/Sonner.NetCore.csproj --configuration Release --no-build --output ./nupkg

    - name: Push to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push to GitHub Packages
      run: |
        dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        dotnet nuget push ./nupkg/*.nupkg --source github --skip-duplicate
